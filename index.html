<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REACTION DRIVER</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="img/logo.png" />
  </head>
  <body>
    <header class="game-header">
      <img
        src="img/Logo-RACC.webp"
        class="nueva-imagen-izquierda"
        alt="Logo RACC"
      />

      <div class="header-container">
        <img src="img/logo.png" alt="Logo Reaction" class="header-logo" />
        <div class="header-titols">
          <h1>REACTION</h1>
          <h2>DRIVER</h2>
        </div>
      </div>
    </header>

    <main>
      <video id="video-fondo" autoplay muted loop>
        <source src="video/Grabación 2026-03-23 130532.mp4" type="video/mp4" />
      </video>

      <div class="contenedor-menu">
        <a href="https://davidc0208.github.io/RACC-Explicaci-n/">
          <button class="btn-gran">JUGAR</button>
        </a>

        <div class="bloque-opcions">
          <button id="btn-opcions" class="btn-gran">OPCIONS</button>

          <div id="finestra-instruccions" class="popover oculto">
            <h3>Comandaments</h3>
            <ul>
              <li><strong>↑ :</strong> A dalt</li>
              <li><strong>↓ :</strong> A baix</li>
              <li><strong>→ :</strong> Accelerar</li>
              <li><strong>← :</strong> Frenar</li>
            </ul>
            <button id="btn-tancar">Tancar</button>
          </div>
        </div>

        <a href="https://docs.google.com/document/d/1NrLlnZL9qVQ2_xJM8LVcyDhGghp_f7-04zqtTWuck4k/edit?pli=1&tab=t.0">
          <button class="btn-gran">¿Com s'ha fet?</button>
        </a>
      </div>
    </main>

    <footer class="footer-fijo">
      <img src="img/logo-transit.webp" alt="Transit" class="img-footer" />
      <h3>@2026</h3>
      <img
        src="img/logo-generalitat-de-catalunya.webp"
        alt="Generalitat"
        class="img-footer"
      />
    </footer>

    <script>
      const botoOpcions = document.getElementById("btn-opcions");
      const finestra = document.getElementById("finestra-instruccions");
      const botoTancar = document.getElementById("btn-tancar");

      botoOpcions.onclick = function (e) {
        e.preventDefault();
        finestra.classList.toggle("oculto");
      };

      botoTancar.onclick = function () {
        finestra.classList.add("oculto");
      };
    </script>
  </body>
</html>
