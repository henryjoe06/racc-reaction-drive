<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Selección de Niveles - Mundo 2D</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Press Start 2P", cursive;
        background: linear-gradient(#1b2735, #090a0f);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 300%;
        height: 300%;
        background: url("https://i.imgur.com/8wP4JxT.png");
        opacity: 0.12;
        animation: fondo 35s linear infinite;
        z-index: -1;
      }

      @keyframes fondo {
        from {
          transform: translate(0, 0) scale(1.2);
        }
        to {
          transform: translate(-400px, -400px) scale(1.2);
        }
      }

      h1 {
        margin-top: 40px;
        font-size: 2.4em;
        color: #ffdd59;
        text-shadow: 4px 4px #000;
        letter-spacing: 4px;
      }

      .galeria-niveles {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(3, 180px);
        gap: 40px;
        padding: 40px;
        background: rgba(0, 0, 0, 0.35);
        border: 4px solid #ffdd59;
        border-radius: 15px;
        box-shadow: 0 0 25px #000;
      }

      .tarjeta-nivel {
        width: 180px;
        height: 180px;
        background: linear-gradient(#ff9f1a, #e67e22);
        border: 5px solid #d35400;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        transition:
          transform 0.25s ease,
          filter 0.25s ease;
        box-shadow:
          0 10px 0 #b34700,
          0 0 20px #000;
        animation: flotar 2.5s ease-in-out infinite;
      }

      @keyframes flotar {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .tarjeta-nivel:not(.bloqueado):hover {
        transform: scale(1.12);
        filter: brightness(1.25);
        cursor: pointer;
      }

      .numero-nivel {
        font-size: 2.8em;
        text-shadow: 4px 4px #000;
        z-index: 2;
      }

      .estrellas {
        margin-top: 12px;
        font-size: 1.6em;
        color: #ffdd59;
        text-shadow: 3px 3px #000;
        z-index: 2;
      }

      .tarjeta-nivel.bloqueado {
        background: linear-gradient(#6c7a89, #4b5a67);
        border-color: #3d4a55;
        filter: grayscale(50%);
        animation: none;
      }

      /* ===== CADENAS EN CRUZ (2 “bandas” cruzadas) ===== */
      .cadenas-cruz {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      .cadenas-cruz {
        position: absolute;
        inset: 0;
        background-image: url("img/candado-cadenas.png"); /* tu imagen en cruz */
        background-size: 100% auto;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: none;
        z-index: 5;
        filter: drop-shadow(0 0 8px #000);
      }

      .cadenas-cruz::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }

      .cadenas-cruz::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .tarjeta-nivel.bloqueado:hover {
        animation: vibrar 0.25s infinite alternate;
      }

      @keyframes vibrar {
        from {
          transform: translateX(-3px);
        }
        to {
          transform: translateX(3px);
        }
      }
    </style>
  </head>

  <body>
    <h1>SELECCIÓN DE NIVELES</h1>

    <div class="galeria-niveles" id="galeriaNiveles"></div>

    <audio
      id="sonidoClick"
      src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"
    ></audio>

    <script>
      const datosNiveles = [
        { id: 1, estaDesbloqueado: true, estrellasObtenidas: 3 },
        { id: 2, estaDesbloqueado: true, estrellasObtenidas: 2 },
        { id: 3, estaDesbloqueado: true, estrellasObtenidas: 1 },
        { id: 4, estaDesbloqueado: false, estrellasObtenidas: 0 },
        { id: 5, estaDesbloqueado: false, estrellasObtenidas: 0 },
        { id: 6, estaDesbloqueado: false, estrellasObtenidas: 0 },
      ];

      const contenedorGaleria = document.getElementById("galeriaNiveles");
      const sonidoClick = document.getElementById("sonidoClick");

      function renderizarGaleria() {
        contenedorGaleria.innerHTML = "";

        datosNiveles.forEach((nivel) => {
          const tarjeta = document.createElement("div");
          tarjeta.classList.add("tarjeta-nivel");
          if (!nivel.estaDesbloqueado) tarjeta.classList.add("bloqueado");

          const numero = document.createElement("div");
          numero.classList.add("numero-nivel");
          numero.textContent = nivel.id;

          const estrellas = document.createElement("div");
          estrellas.classList.add("estrellas");

          if (nivel.estaDesbloqueado) {
            estrellas.innerHTML =
              "★".repeat(nivel.estrellasObtenidas) +
              "☆".repeat(3 - nivel.estrellasObtenidas);
          }

          tarjeta.appendChild(numero);
          tarjeta.appendChild(estrellas);

          // CADENAS EN CRUZ PARA BLOQUEADOS
          if (!nivel.estaDesbloqueado) {
            const cruz = document.createElement("div");
            cruz.classList.add("cadenas-cruz");
            tarjeta.appendChild(cruz);
          }

          tarjeta.addEventListener("click", () => {
            if (nivel.estaDesbloqueado) {
              sonidoClick.play();

              if (nivel.id === 1) {
                window.location.href =
                  "https://davidc0208.github.io/RACC-ReactionDriver/";
              } else {
                alert("Este nivel aún no tiene juego asignado.");
              }
            } else {
              alert(`Nivel ${nivel.id} está bloqueado.`);
            }
          });

          contenedorGaleria.appendChild(tarjeta);
        });
      }

      renderizarGaleria();
    </script>
  </body>
</html>
