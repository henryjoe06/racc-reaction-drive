<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REACTION DRIVE - SELECCIÓ DE NIVELL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-bg: #0f0c29;
        --card-bg: #24243e;
        --accent: #ff0055;
        --locked: #1a1a2e;
        --gold: #ffde06;
        --cyan: #00d2ff;
        --card-width: 280px;
      }

      body {
        background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
        color: #fff;
        font-family: "Press Start 2P", cursive;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 60px 20px;
      }

      .back-container {
        position: absolute;
        top: 20px;
        left: 20px;
      }

      .back-btn {
        background: transparent;
        color: var(--cyan);
        border: 4px solid var(--cyan);
        padding: 10px 15px;
        font-family: "Press Start 2P", cursive;
        font-size: 10px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.2s;
        box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
      }

      .back-btn:hover {
        background: var(--cyan);
        color: #000;
        box-shadow: 0 0 20px var(--cyan);
        transform: scale(1.05);
      }

      h1 {
        font-size: 32px;
        margin-bottom: 60px;
        color: #fff;
        text-shadow:
          6px 6px 0px var(--accent),
          10px 10px 0px #000;
        text-align: center;
        line-height: 1.5;
      }

      .levels-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        max-width: 1100px;
      }

      .level-card {
        background: var(--card-bg);
        border: 8px solid #fff;
        border-radius: 20px;
        padding: 30px 20px;
        width: var(--card-width);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        box-shadow: 0 15px 0px #000;
        transition: all 0.2s ease-out;
      }

      .level-card:not(.locked):hover {
        transform: translateY(-10px);
        border-color: var(--gold);
      }

      .level-name {
        font-size: 14px;
        margin-bottom: 20px;
        color: var(--cyan);
        height: 40px;
        text-align: center;
      }

      .stars-container {
        margin-bottom: 25px;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px 20px;
        border-radius: 30px;
      }

      .star {
        font-size: 28px;
        color: #2c3e50;
        margin: 0 3px;
      }

      .star.earned {
        color: var(--gold);
        text-shadow: 0 0 10px orange;
        display: inline-block;
        animation: bounce 0.6s ease-in-out infinite alternate;
      }

      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-5px);
        }
      }

      .preview {
        width: 100%;
        height: 120px;
        background: #1a1a2e;
        border: 4px solid #000;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        color: #fff;
        border-radius: 10px;
        background-size: cover;
        background-position: center;
        text-shadow: 2px 2px 0 #000;
      }

      .play-btn {
        background: #009432;
        border: none;
        border-bottom: 6px solid #006266;
        color: white;
        font-family: "Press Start 2P", cursive;
        padding: 18px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        border-radius: 10px;
      }

      .play-btn:hover:not(:disabled) {
        background: #a3cb38;
      }

      /* --- ESTILOS DE BLOQUEO RECUPERADOS --- */
      .locked {
        filter: grayscale(0.5) brightness(0.7);
      }

      .lock-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        overflow: hidden;
        border-radius: 20px;
      }

      .chain {
        position: absolute;
        width: 140%;
        height: 25px;
        background: linear-gradient(90deg, #7f8c8d, #bdc3c7, #7f8c8d);
        border: 4px solid #2d3436;
        border-radius: 15px;
      }
      .chain-1 {
        transform: rotate(45deg);
      }
      .chain-2 {
        transform: rotate(-45deg);
      }

      .padlock {
        position: relative;
        font-size: 60px;
        background: #f1c40f;
        width: 90px;
        height: 90px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 20px;
        border: 6px solid #2d3436;
        box-shadow: 0 8px 0 #c23616;
        animation: lockFloat 2s infinite ease-in-out;
      }

      @keyframes lockFloat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
      }
      .shake {
        animation: shake 0.4s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="back-container">
      <a href="../index.html" class="back-btn"> < TORNAR</a>
    </div>

    <h1>REACTION DRIVER</h1>
    <div class="levels-grid" id="mainGrid"></div>

    <script>
      // 1. LÓGICA DE PROGRESO AL VOLVER
      function checkProgress() {
        const lastPlayed = localStorage.getItem("lastPlayedID");
        const isWaiting = sessionStorage.getItem("waitingVictory");

        if (isWaiting === "true" && lastPlayed) {
          const currentID = parseInt(lastPlayed);
          const savedProgress =
            parseInt(localStorage.getItem("reactionDriveProgress")) || 1;

          if (currentID >= savedProgress) {
            localStorage.setItem("reactionDriveProgress", currentID + 1);
          }
          localStorage.setItem(`stars_lvl_${currentID}`, "3");
          sessionStorage.removeItem("waitingVictory");
        }
      }

      checkProgress();

      const levels = [
        {
          id: 1,
          name: "Nivell 1",
          url: "https://davidc0208.github.io/RACC-ReactionDriver/",
          image: "../img/img-juego.png",
        },
        {
          id: 2,
          name: "Nivell 2",
          url: "https://davidc0208.github.io/RACC-ReactionDriver/",
          image: "../img/img-juego.png",
        },
        {
          id: 3,
          name: "Nivell 3",
          url: "https://davidc0208.github.io/RACC-ReactionDriver/",
          image: "../img/img-juego.png",
        },
      ];

      function renderLevels() {
        const progress =
          parseInt(localStorage.getItem("reactionDriveProgress")) || 1;
        const grid = document.getElementById("mainGrid");
        grid.innerHTML = "";

        levels.forEach((lvl) => {
          const isLocked = lvl.id > progress;
          const hasStars = localStorage.getItem(`stars_lvl_${lvl.id}`) === "3";

          const card = document.createElement("div");
          card.className = `level-card ${isLocked ? "locked" : ""}`;
          card.id = `card-${lvl.id}`;

          let starsHTML = "";
          for (let i = 1; i <= 3; i++) {
            starsHTML += `<span class="star ${hasStars ? "earned" : ""}">★</span>`;
          }

          card.innerHTML = `
            <div class="level-name">${lvl.name}</div>
            <div class="stars-container">${starsHTML}</div>
            <div class="preview" style="background-image: url('${lvl.image}');">STAGE ${lvl.id}</div>
            ${
              isLocked
                ? `
                <div class="lock-overlay">
                    <div class="chain chain-1"></div>
                    <div class="chain chain-2"></div>
                    <div class="padlock">🔒</div>
                </div>
            `
                : ""
            }
            <button class="play-btn" onclick="handlePlay(${lvl.id})">JUGAR</button>
          `;
          grid.appendChild(card);
        });
      }

      window.handlePlay = function (id) {
        const progress =
          parseInt(localStorage.getItem("reactionDriveProgress")) || 1;

        if (id > progress) {
          const card = document.getElementById(`card-${id}`);
          card.classList.add("shake");
          setTimeout(() => card.classList.remove("shake"), 400);
          return;
        }

        localStorage.setItem("lastPlayedID", id);
        sessionStorage.setItem("waitingVictory", "true");
        window.location.href = levels.find((l) => l.id === id).url;
      };

      renderLevels();
    </script>
  </body>
</html>
