<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Contenedor principal para alinear botones */
      .menu-container {
        display: flex;
        flex-direction: column;
        gap: 15px; /* Espacio entre botones */
        align-items: center;
        position: relative;
      }

      /* El estilo de TUS botones (ajusta colores si son diferentes) */
      .btn-menu {
        background-color: #ffcc00; /* Color amarillo/naranja de tu imagen */
        color: black;
        border: 4px solid #000;
        padding: 10px 30px;
        font-family: "Arial Black", sans-serif;
        font-size: 20px;
        cursor: pointer;
        width: 200px;
        text-transform: uppercase;
        box-shadow: 5px 5px 0px #000;
      }

      .btn-menu:active {
        box-shadow: 2px 2px 0px #000;
        transform: translate(3px, 3px);
      }

      /* Posicionamiento de la pestaña de opciones */
      .contenedor-opcions {
        position: relative; /* Para que la ventana se mueva con el botón */
      }

      .popover {
        position: absolute;
        left: 220px; /* Se abre a la derecha del botón */
        top: 0; /* A la misma altura exacta */
        width: 250px;
        background: white;
        border: 4px solid #000;
        padding: 15px;
        z-index: 10;
        box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
      }

      .popover h3 {
        margin-top: 0;
        font-size: 16px;
        border-bottom: 2px solid #eee;
      }

      .popover ul {
        list-style: none;
        padding: 0;
        font-family: sans-serif;
        font-size: 14px;
      }

      .popover li {
        margin-bottom: 8px;
      }

      .popover span {
        background: #eee;
        padding: 2px 5px;
        border-radius: 3px;
        font-weight: bold;
        font-family: monospace;
      }

      .oculto {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="menu-container">
      <button class="btn-menu">JUGAR</button>

      <div class="contenedor-opcions">
        <button id="btn-opcions" class="btn-menu">OPCIONS</button>

        <div id="finestra-instruccions" class="popover oculto">
          <h3>⌨️ Comandaments VS Code</h3>
          <ul>
            <li><span>CTRL + P</span> Cercar fitxers</li>
            <li><span>CTRL + SHIFT + P</span> Paleta</li>
            <li><span>CTRL + `</span> Terminal</li>
          </ul>
          <button id="btn-tancar">ENTÈS</button>
        </div>
      </div>
    </div>
    <script>
      const btnOpcions = document.getElementById("btn-opcions");
      const finestra = document.getElementById("finestra-instruccions");
      const btnTancar = document.getElementById("btn-tancar");

      btnOpcions.addEventListener("click", () => {
        finestra.classList.toggle("oculto");
      });

      btnTancar.addEventListener("click", () => {
        finestra.classList.add("oculto");
      });
    </script>
  </body>
</html>
